recipe_version: "2"
name: laguna-s-2.1-nvfp4-vllm-r0b0tlab
description: Laguna S 2.1 native NVFP4 routed experts on one GB10 with FP8 KV and DFlash K=7
model: poolside/Laguna-S-2.1-NVFP4
runtime: vllm
runtime_version: "0.25.1"
container: ghcr.io/r0b0tlab/vllm-laguna-s-2.1-nvfp4-sm121@sha256:8b0e3d07dad370853bca77441ff7c8619c41a0cb80d59a150bb0faf17ee15ef3
min_nodes: 1
max_nodes: 1
metadata:
  maintainer: r0b0tlab
  model_params: 117.6B
  model_dtype: nvfp4
  kv_dtype: fp8
  quantization: compressed-tensors
  quant_bits: 4
defaults:
  host: 0.0.0.0
  port: 8000
  model_revision: 216d1f13878dd4e715bc7412848d0f330e95bba6
  draft_model: poolside/Laguna-S-2.1-DFlash-NVFP4
  draft_revision: 723794750422b3efbf3a7b3af76dffb4ba035943
  tensor_parallel: 1
  max_model_len: 262144
  max_num_seqs: 32
  max_num_batched_tokens: 8192
  gpu_memory_utilization: 0.85
  served_model_name: poolside/Laguna-S-2.1-NVFP4
env:
  MAX_JOBS: "4"
  NVCC_THREADS: "2"
  FLASHINFER_NVCC_THREADS: "2"
  CUTE_DSL_ARCH: sm_121a
command: |
  vllm serve {model} --revision {model_revision} --served-model-name {served_model_name} \
    --host {host} --port {port} -tp {tensor_parallel} --dtype bfloat16 \
    --trust-remote-code --attention-backend FLASHINFER --kv-cache-dtype fp8 \
    --max-model-len {max_model_len} --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --speculative-config '{"method":"dflash","model":"{draft_model}","revision":"{draft_revision}","num_speculative_tokens":7}' \
    --reasoning-parser poolside_v1 --enable-auto-tool-choice \
    --tool-call-parser poolside_v1 \
    --override-generation-config '{"temperature":0.7,"top_p":0.95,"top_k":20}'
executor_config:
  auto_remove: false
  restart_policy: unless-stopped
